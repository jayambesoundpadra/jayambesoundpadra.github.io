            <p>At JAY AMBE SOUND PADRA we make it easy to book professional audio services for your events. Whether you're planning a wedding, corporate gathering, or concert, our team will handle the setup and sound management.</p>
        </section>
        <section>
            <h2>Book Your Event</h2>
            <form action="#" method="post">
                <label for="name">Name:</label>
                <input type="text" id="name" name="name" required>

                <label for="email">Email:</label>
                <input type="email" id="email" name="email" required>

                <label for="date">Event Date:</label>
                <input type="date" id="date" name="date" required>

                <label for="details">Event Details:</label>
                <textarea id="details" name="details" rows="4"></textarea>

                <button type="submit">Submit Booking Request</button>
