    <link rel="stylesheet" href="style.css">

</head>
<body>

        <img src="assets/sound.jpg" alt="Site Logo" id="logo">
        <nav>

                <li><a href="index.html">Home</a></li>

        </nav>
        <h1>JAY AMBE SOUND PADRA</h1>
    </header>
    <main>
        <section id="gallery">
            <h2>Photo Gallery</h2>
            <div id="photoGrid" class="photo-grid"></div>
        </section>
    </main>
    <script src="script.js"></script>
    <script>
        const photoGrid = document.getElementById('photoGrid');
        const totalPhotos = 34;
        let loadedCount = 0;
        let attemptedCount = 0;
        const sourcePaths = [
            'assets',
            '../../../Assets'
        ];

        function createPhotoCard(index) {
            const card = document.createElement('div');
            card.className = 'photo-card';
            const img = document.createElement('img');
            img.alt = '';
            img.loading = 'lazy';
            img.dataset.index = index;
            img.dataset.sourceIndex = '0';
            img.src = `${sourcePaths[0]}/home${index}.jpg`;

            img.onload = () => {
                loadedCount += 1;
            };

            img.onerror = () => {
                const nextSource = Number(img.dataset.sourceIndex) + 1;
                if (nextSource < sourcePaths.length) {
                    img.dataset.sourceIndex = String(nextSource);
                    img.src = `${sourcePaths[nextSource]}/home${index}.jpg`;
                    return;
                }
                attemptedCount += 1;
                card.remove();
            };

            card.appendChild(img);
            return card;
        }

        for (let i = 1; i <= totalPhotos; i++) {
            const card = createPhotoCard(i);
            photoGrid.appendChild(card);
        }

        if (window.startPhotoHighlights) {
            window.startPhotoHighlights();
        }
    </script>
    <footer>
        <p>Follow us:</p>

            <li><a href="https://www.youtube.com/@jayambesoundpadra1369" class="youtube" title="YouTube"><i class="fab fa-youtube"></i></a></li>
        </ul>
    </footer>
</body>
