            </ul>
        </nav>
        <h1>JAY AMBE SOUND PADRA</h1>
    </header>
    <main>
        <section id="gallery">
            <h2>Photo Gallery</h2>
            <div id="photoGrid" class="photo-grid"></div>
        </section>
    </main>
    <script src="script.js"></script>
    <script>
        const photoGrid = document.getElementById('photoGrid');
        const totalPhotos = 33;
        const extensions = ['.jpg'];
        const sourcePaths = ['assets'];

        function createPhotoCard(index) {
            const card = document.createElement('div');
            card.className = 'photo-card';

            const img = document.createElement('img');
            img.alt = `home${index}.jpg`;
            img.loading = 'lazy';
            img.dataset.index = index;
            img.dataset.sourceIndex = '0';
            img.dataset.extIndex = '0';
            img.src = `${sourcePaths[0]}/home${index}${extensions[0]}`;

            const caption = document.createElement('p');
            caption.className = 'photo-caption';
            caption.textContent = `home${index}.jpg`;

            img.onload = () => {
                card.appendChild(caption);
            };

            img.onerror = () => {
                const nextExt = Number(img.dataset.extIndex) + 1;
                if (nextExt < extensions.length) {
                    img.dataset.extIndex = String(nextExt);
                    img.src = `${sourcePaths[Number(img.dataset.sourceIndex)]}/home${index}${extensions[nextExt]}`;
                    return;
                }

                const nextSource = Number(img.dataset.sourceIndex) + 1;
                if (nextSource < sourcePaths.length) {
                    img.dataset.sourceIndex = String(nextSource);
                    img.dataset.extIndex = '0';
                    img.src = `${sourcePaths[nextSource]}/home${index}${extensions[0]}`;
                    return;
                }

                card.remove();
            };

            card.appendChild(img);
            return card;
        }

        for (let i = 1; i <= totalPhotos; i++) {
            const card = createPhotoCard(i);
            photoGrid.appendChild(card);
        }

        if (window.startPhotoHighlights) {
            window.startPhotoHighlights();
        }
    </script>
